name: Deploy Vite build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for actions/deploy-pages@v4 to write to Pages environment
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys — one at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Build-time env vars. Vite only inlines VITE_* prefixed vars, so the
      # API keys land inside the public bundle. Anyone can read them in
      # DevTools, so use keys with a spending cap and rotate them if you ever
      # suspect abuse. .env at the project root is gitignored — secrets
      # come from repo Settings → Secrets and variables → Actions.
      # The `if:` uses `secrets.` (not `env.`) because env on this step is
      # defined inside the step itself, which is not yet bound when the
      # conditional is evaluated.
      - name: Write .env from secrets
        if: ${{ secrets.VITE_OPENROUTER_API_KEY != '' || secrets.VITE_OPENROUTER_API_KEY_2 != '' || secrets.VITE_GOOGLE_STUDIO_API_KEY != '' || secrets.VITE_CHATWOOT_WEBSITE_TOKEN != '' }}
        env:
          VITE_LLM_PROVIDER: ${{ secrets.VITE_LLM_PROVIDER }}
          VITE_LLM_MODEL: ${{ secrets.VITE_LLM_MODEL }}
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_OPENROUTER_API_KEY_2: ${{ secrets.VITE_OPENROUTER_API_KEY_2 }}
          VITE_OPENROUTER_API_KEY_3: ${{ secrets.VITE_OPENROUTER_API_KEY_3 }}
          VITE_OPENROUTER_API_KEY_4: ${{ secrets.VITE_OPENROUTER_API_KEY_4 }}
          VITE_GOOGLE_STUDIO_API_KEY: ${{ secrets.VITE_GOOGLE_STUDIO_API_KEY }}
          VITE_CHATWOOT_BASE_URL: ${{ secrets.VITE_CHATWOOT_BASE_URL }}
          VITE_CHATWOOT_WEBSITE_TOKEN: ${{ secrets.VITE_CHATWOOT_WEBSITE_TOKEN }}
        run: |
          {
            echo "VITE_LLM_PROVIDER=${VITE_LLM_PROVIDER:-openrouter}"
            echo "VITE_LLM_MODEL=${VITE_LLM_MODEL:-anthropic/claude-3-haiku}"
            [ -n "$VITE_OPENROUTER_API_KEY" ]     && echo "VITE_OPENROUTER_API_KEY=$VITE_OPENROUTER_API_KEY"
            [ -n "$VITE_OPENROUTER_API_KEY_2" ]   && echo "VITE_OPENROUTER_API_KEY_2=$VITE_OPENROUTER_API_KEY_2"
            [ -n "$VITE_OPENROUTER_API_KEY_3" ]   && echo "VITE_OPENROUTER_API_KEY_3=$VITE_OPENROUTER_API_KEY_3"
            [ -n "$VITE_OPENROUTER_API_KEY_4" ]   && echo "VITE_OPENROUTER_API_KEY_4=$VITE_OPENROUTER_API_KEY_4"
            [ -n "$VITE_GOOGLE_STUDIO_API_KEY" ]  && echo "VITE_GOOGLE_STUDIO_API_KEY=$VITE_GOOGLE_STUDIO_API_KEY"
            [ -n "$VITE_CHATWOOT_BASE_URL" ]      && echo "VITE_CHATWOOT_BASE_URL=$VITE_CHATWOOT_BASE_URL"
            [ -n "$VITE_CHATWOOT_WEBSITE_TOKEN" ] && echo "VITE_CHATWOOT_WEBSITE_TOKEN=$VITE_CHATWOOT_WEBSITE_TOKEN"
          } > .env
          echo "Wrote .env:"
          cat .env | sed -E 's/(KEY|TOKEN|URL)=.+/\1=<redacted>/'

      - name: Build
        run: npm run build

      - name: Add .nojekyll (disable Jekyll processing for paths starting with _)
        run: touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
